name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI is the only reason a bot needs to read this repo — no write access.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke tests (scanner + dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint — Biome's correctness + suspicious rules only. Style rules are
      # mostly disabled to avoid a big churn day-one; the goal here is to
      # catch real bugs (unused imports, shadowed variables, assign-in-cond)
      # rather than enforce a specific house style.
      - name: Lint
        run: npm run lint

      # Unit tests — Vitest covers the pure-logic modules (risk classifier,
      # EU AI Act evaluator + scoring, AI compliance risk generation) with
      # focused per-function assertions. Adds meaningful coverage beyond
      # "did not throw" while still running in milliseconds.
      - name: Unit tests
        run: npm test

      # Run the scanner against this repo itself. Catches scanner-side
      # regressions end-to-end: scan rules, policy rendering, framework
      # evaluation, and report generation all exercised on a real tree.
      - name: Scanner smoke
        run: npm run scan -- .

      # Dashboard render paths get their own smoke test with two fixtures:
      # a current-shape manifest and a pre-Phase-8 manifest missing the
      # aiSystems field. The second fixture guards against the 2026-04-18
      # outage where an older stored manifest took /api/repos and the
      # homepage down with an uncaught TypeError.
      - name: Dashboard render smoke
        run: npm run smoke:dashboard
