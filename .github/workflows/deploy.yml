name: Deploy Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # Preflight: fail fast with a clear message if required secrets are
      # missing. Without this, wrangler would either error on the literal
      # placeholder "YOUR_KV_NAMESPACE_ID" or fail to authenticate, and
      # forkers would get an opaque API response instead of a pointer back
      # to their repo settings.
      - name: Preflight secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Create one at https://dash.cloudflare.com/profile/api-tokens and add it as a repo secret."
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_KV_ID }}" ]; then
            echo "::error::CLOUDFLARE_KV_ID secret is not set. Create a KV namespace with 'npx wrangler kv namespace create GRC_KV' and add its id as a repo secret."
            exit 1
          fi

      # KV namespace id has to live in wrangler.toml — no CLI flag for it —
      # so we substitute the placeholder at deploy time. The placeholder
      # stays in the committed file so local `wrangler dev --local` still
      # works against miniflare without any secret rewiring.
      - name: Inject KV namespace id into wrangler.toml
        run: sed -i "s/YOUR_KV_NAMESPACE_ID/${{ secrets.CLOUDFLARE_KV_ID }}/" wrangler.toml

      # ORG_NAME and GRC_AUDIENCE are passed via `--var` rather than a TOML
      # rewrite. The prior approach uncommented `ORG_NAME = "..."` but left
      # `[vars]` commented, leaving ORG_NAME at the top level where the
      # worker never saw it. `--var` binds cleanly regardless of TOML
      # structure and is a no-op when the repo variable is unset.
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ORG_NAME_VAR: ${{ vars.ORG_NAME }}
          GRC_AUDIENCE_VAR: ${{ vars.GRC_AUDIENCE }}
        run: |
          ARGS=()
          if [ -n "$ORG_NAME_VAR" ]; then
            ARGS+=(--var "ORG_NAME:$ORG_NAME_VAR")
          fi
          if [ -n "$GRC_AUDIENCE_VAR" ]; then
            ARGS+=(--var "GRC_AUDIENCE:$GRC_AUDIENCE_VAR")
          fi
          npx wrangler deploy "${ARGS[@]}"
