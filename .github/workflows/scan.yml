name: GRC Compliance Scan

on:
  workflow_call:
    inputs:
      site_url:
        description: "Live site URL for header/TLS checks (optional)"
        required: false
        type: string
        default: ""
      commit_manifest:
        description: "Commit manifest.yml and reports back to the repo"
        required: false
        type: boolean
        default: true
      node_version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      GRC_DASHBOARD_KEY:
        required: false

jobs:
  scan:
    name: GRC Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: target

      - name: Checkout GRC scanner
        uses: actions/checkout@v4
        with:
          repository: shipstuff/GRC-Observability-Dashboard
          path: scanner

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install scanner dependencies
        working-directory: scanner
        run: npm ci

      - name: Run GRC scan
        working-directory: scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS="${{ github.workspace }}/target"
          if [ -n "${{ inputs.site_url }}" ]; then
            ARGS="$ARGS --url=${{ inputs.site_url }}"
          fi
          npx tsx scanner/index.ts $ARGS

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grc-scan-results
          path: target/.grc/
          retention-days: 90

      - name: Commit manifest and reports
        if: inputs.commit_manifest && github.event_name == 'push'
        working-directory: target
        run: |
          git config user.name "GRC Bot"
          git config user.email "grc-bot@users.noreply.github.com"
          git add .grc/
          if git diff --staged --quiet; then
            echo "No compliance changes detected"
          else
            git commit -m "[GRC] Update compliance manifest and reports

          Automated compliance scan by GRC Observability Dashboard.
          See .grc/ directory for full reports."
            git push
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        working-directory: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use AI-generated PR comment if available, otherwise build from manifest
          if [ -f .grc/pr-comment.md ]; then
            BODY=$(cat .grc/pr-comment.md)
          else
            # Build a summary from the manifest
            BODY="## GRC Compliance Scan\n\n"
            if [ -f .grc/manifest.yml ]; then
              BODY+="Scan complete. See artifacts for full reports.\n\n"

              # Extract key metrics from manifest
              CRITICAL=$(grep 'criticalVulnerabilities:' .grc/manifest.yml | awk '{print $2}' || echo "?")
              HIGH=$(grep 'highVulnerabilities:' .grc/manifest.yml | awk '{print $2}' || echo "?")

              BODY+="| Check | Status |\n|-------|--------|\n"

              if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ]; then
                BODY+="| Dependencies | ✅ No critical/high vulns |\n"
              else
                BODY+="| Dependencies | ⚠️ ${CRITICAL} critical, ${HIGH} high vulns |\n"
              fi

              SECRETS=$(grep 'detected:' .grc/manifest.yml | head -1 | awk '{print $2}')
              if [ "$SECRETS" = "false" ]; then
                BODY+="| Secrets | ✅ None detected |\n"
              else
                BODY+="| Secrets | ❌ Potential secrets found |\n"
              fi

              BODY+="\n📋 Full reports available in the scan artifacts."
            fi
          fi

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

      - name: POST to dashboard
        if: secrets.GRC_DASHBOARD_KEY != ''
        run: |
          if [ -f target/.grc/manifest.yml ]; then
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GRC_DASHBOARD_KEY }}" \
              -H "Content-Type: application/x-yaml" \
              --data-binary @target/.grc/manifest.yml \
              "${{ vars.GRC_DASHBOARD_URL || 'https://grc-dashboard.joeeftekhari.com' }}/api/report" \
              || echo "Dashboard POST failed (non-fatal)"
          fi
