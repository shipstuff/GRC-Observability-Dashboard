name: "GRC Compliance Scan"
description: "Scan a repository for compliance issues and generate governance artifacts"

inputs:
  site_url:
    description: "Live site URL for header/TLS checks (optional, used by dashboard Check Production button)"
    required: false
    default: ""
  dashboard_url:
    description: "Dashboard URL to POST manifest to (optional)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout GRC scanner
      uses: actions/checkout@v4
      with:
        repository: shipstuff/GRC-Observability-Dashboard
        path: .grc-scanner

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install scanner dependencies
      shell: bash
      working-directory: .grc-scanner
      run: npm ci

    - name: Run GRC scan (static only)
      shell: bash
      working-directory: .grc-scanner
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        GRC_BRANCH: ${{ github.head_ref || github.ref_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        npx tsx scanner/index.ts "${{ github.workspace }}"

    - name: POST manifest to dashboard
      if: inputs.dashboard_url != ''
      shell: bash
      run: |
        if [ -f "${{ github.workspace }}/.grc/manifest.yml" ]; then
          curl -sf -X POST \
            -H "Content-Type: application/x-yaml" \
            --data-binary @"${{ github.workspace }}/.grc/manifest.yml" \
            "${{ inputs.dashboard_url }}/api/report?site_url=${{ inputs.site_url }}" \
            && echo "Manifest POSTed to dashboard" \
            || echo "::warning::Failed to POST manifest to dashboard"
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ -f "${{ github.workspace }}/.grc/pr-comment.md" ]; then
          BODY=$(cat "${{ github.workspace }}/.grc/pr-comment.md")
        else
          BODY="## GRC Compliance Scan

        Scan complete. Download **grc-scan-results** artifact for full reports."
        fi
        gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body "$BODY"

    - name: Cleanup scanner
      shell: bash
      run: rm -rf .grc-scanner
