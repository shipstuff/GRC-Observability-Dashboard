name: "GRC Compliance Scan"
description: "Scan a repository for compliance issues and generate governance artifacts"

inputs:
  site_url:
    description: "Live site URL for header/TLS checks (optional)"
    required: false
    default: ""
  dashboard_url:
    description: "Dashboard URL to POST manifest to (optional)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout GRC scanner
      uses: actions/checkout@v4
      with:
        repository: shipstuff/GRC-Observability-Dashboard
        path: .grc-scanner

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install scanner dependencies
      shell: bash
      working-directory: .grc-scanner
      run: npm ci

    - name: Wait for deploy (merge to main only)
      if: github.event_name == 'push' && inputs.site_url != ''
      shell: bash
      run: |
        echo "Waiting 90s for deploy to finish before running live checks..."
        sleep 90

    - name: Run GRC scan
      shell: bash
      working-directory: .grc-scanner
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        GRC_BRANCH: ${{ github.head_ref || github.ref_name }}
        GRC_EVENT: ${{ github.event_name }}
      run: |
        ARGS="${{ github.workspace }}"
        # Only include live URL on push (merge) — not on PR since code isn't deployed yet
        if [ "$GRC_EVENT" = "push" ] && [ -n "${{ inputs.site_url }}" ]; then
          ARGS="$ARGS --url=${{ inputs.site_url }}"
        fi
        npx tsx scanner/index.ts $ARGS

    - name: POST manifest to dashboard
      if: inputs.dashboard_url != ''
      shell: bash
      run: |
        if [ -f "${{ github.workspace }}/.grc/manifest.yml" ]; then
          curl -sf -X POST \
            -H "Content-Type: application/x-yaml" \
            --data-binary @"${{ github.workspace }}/.grc/manifest.yml" \
            "${{ inputs.dashboard_url }}/api/report" \
            && echo "Manifest POSTed to dashboard" \
            || echo "::warning::Failed to POST manifest to dashboard"
        fi

    - name: Cleanup scanner
      shell: bash
      run: rm -rf .grc-scanner
