name: "GRC Compliance Scan"
description: "Scan a repository for compliance issues and generate governance artifacts"

inputs:
  site_url:
    description: "Live site URL for header/TLS checks (optional, used by dashboard Check Production button)"
    required: false
    default: ""
  dashboard_url:
    description: "Dashboard URL to POST manifest to (optional)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout GRC scanner
      uses: actions/checkout@v4
      with:
        repository: shipstuff/GRC-Observability-Dashboard
        path: .grc-scanner

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install scanner dependencies
      shell: bash
      working-directory: .grc-scanner
      run: npm ci

    - name: Run GRC scan (static only)
      shell: bash
      working-directory: .grc-scanner
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        GRC_BRANCH: ${{ github.head_ref || github.ref_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        npx tsx scanner/index.ts "${{ github.workspace }}"

    - name: Commit generated policies to PR branch
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # Scanner writes the effective outputDir (post-sanitization) to this file
        # so we stage the exact same path the scanner used.
        if [ ! -f .grc/output-dir ]; then
          echo "::warning::No .grc/output-dir file found — scan may have failed. Skipping policy commit."
          exit 0
        fi
        OUTPUT_DIR=$(tr -d '\n' < .grc/output-dir)
        if [ -z "$OUTPUT_DIR" ]; then
          echo "::warning::Empty outputDir — skipping policy commit."
          exit 0
        fi

        # Stage only the files the scanner is allowed to manage
        git add -- "$OUTPUT_DIR/" .well-known/security.txt 2>/dev/null || true

        # Check if anything actually changed
        if git diff --staged --quiet; then
          echo "No policy changes to commit."
          exit 0
        fi

        # Identify as grc-bot so commits are clearly attributed
        git config user.name "grc-bot"
        git config user.email "grc-bot@users.noreply.github.com"

        # Commit and push, but don't fail the action if we lack write permission
        if git commit -m "chore(grc): update generated compliance policies" \
           && git push origin "HEAD:${{ github.head_ref }}" 2>&1; then
          echo "✓ Policies committed to ${{ github.head_ref }}"
        else
          echo "::warning::Could not push policies to PR branch. Workflow may lack 'contents: write' permission. Generated files exist in the scan artifacts but won't be persisted to the repo."
          # Reset the index so we don't leave staged-but-uncommitted state
          git reset --hard HEAD~1 2>/dev/null || git reset HEAD 2>/dev/null || true
          exit 0
        fi

    - name: POST manifest to dashboard
      if: inputs.dashboard_url != ''
      shell: bash
      run: |
        if [ -f "${{ github.workspace }}/.grc/manifest.yml" ]; then
          curl -sf -X POST \
            -H "Content-Type: application/x-yaml" \
            --data-binary @"${{ github.workspace }}/.grc/manifest.yml" \
            "${{ inputs.dashboard_url }}/api/report?site_url=${{ inputs.site_url }}" \
            && echo "Manifest POSTed to dashboard" \
            || echo "::warning::Failed to POST manifest to dashboard"
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ -f "${{ github.workspace }}/.grc/pr-comment.md" ]; then
          BODY=$(cat "${{ github.workspace }}/.grc/pr-comment.md")
        else
          BODY="## GRC Compliance Scan

        Scan complete. Download **grc-scan-results** artifact for full reports."
        fi
        gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body "$BODY"

    - name: Cleanup scanner
      shell: bash
      run: rm -rf .grc-scanner
