# Copy this file to your repo at .github/workflows/grc-scan.yml

name: GRC Compliance Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write       # needed so the action can commit generated policies to the PR branch
  pull-requests: write  # needed for the PR comment summarising the scan
  id-token: write       # needed to mint the OIDC JWT the dashboard uses to authenticate this workflow

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shipstuff/GRC-Observability-Dashboard@main
        with:
          site_url: https://yoursite.com
          dashboard_url: https://your-dashboard.workers.dev
        env:
          GITHUB_TOKEN: ${{ github.token }}
